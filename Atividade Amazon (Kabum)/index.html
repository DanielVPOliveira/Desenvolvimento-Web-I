<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">




</head>

<body>

    <header class="Barra-topo">
        <div class="linha-superior">
            <img src="logo.png" alt="logo" class="logo">


            <input type="text" class="pesquisa" placeholder="Busque no KaBuM!">

            <div class="direito">
                <img src="Lado superior direito.PNG" alt="">
            </div>


        </div>





        <div class="linha-inferior">

            <button class="departamentos">
                Departamentos ▼
            </button>


            <button class="cupons">
                Cupons
            </button>

            <button class="vendidos">
                Mais Vendidos
            </button>

            <button class="hardware">
                Hardware
            </button>

            <button class="mais">
                Mais
            </button>


            <div class="monte">
                <img src="banner_monte_seu_pc.png" alt="Monte seu PC">
            </div>


        </div>

    </header>


    

    <div id="carouselExample" class="carousel slide">
        <div class="carousel-inner">
         <div class="carousel-item active">
    <div class="row">

        <div class="col-6">
            <img src="Ps5 kabum.png" class="d-block w-100">
        </div>

        <div class="col-6">
            <img src="Cupons Kabum.png" class="d-block w-100">
        </div>

    </div>
</div>

<div class="carousel-item">
    <div class="row">

        <div class="col-6">
            <img src="Batman kabum.png" class="d-block w-100">
        </div>

        <div class="col-6">
            <img src="Saldão kabum.png" class="d-block w-100">
        </div>

    </div>
</div>

        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

<div class="container">
    <div class="row">

        <div class="col-lg-3 col-md-6 mb-3">
            <div class="card-produto">
                <h5>Visto recentemente</h5>

                <img src="Rx 7600.png" alt="Produto">

                <p>Placa de Vídeo RX 7600 GAMING OC 8GB</p>

                <span class="preco">R$ 1.659,99</span>
            </div>
        </div>

        <div class="col-lg-3 col-md-6 mb-3">
            <div class="card-produto">
                <h5>Ofertas KaBuM!</h5>

                <img src="Cadeira.png" alt="Produto">

                <p>Cadeira Gamer Husky</p>

                <span class="desconto">-28%</span>
                <br>

                <span class="preco">R$ 749,99</span>
            </div>
        </div>

        <div class="col-lg-3 col-md-6 mb-3">
            <div class="card-produto">
                <h5>Mais vendidos em placa de vídeo</h5>

                <img src="RTX.png" alt="Produto">

                <p>RTX 5070</p>

                <span class="desconto">-17%</span>
                <br>

                <span class="preco">R$ 1.899,99</span>
            </div>
        </div>

        <div class="col-lg-3 col-md-6 mb-3">
            <div class="card-produto">
                <h5>Frete grátis</h5>

                <img src="monitor.png" alt="Produto">

                <p>Monitor Gamer ASUS</p>

                <span class="desconto">-33%</span>
                <br>

                <span class="preco">R$ 1.399,99</span>
            </div>
        </div>

    </div>
</div>


<div id="categoriasCarousel" class="carousel slide">

    <div class="carousel-inner">

        <div class="carousel-item active">

            <div class="d-flex justify-content-around">

                <div class="categoria">
                    <img src="MOUSE.PNG">
                    <h5>Periféricos</h5>
                </div>

                <div class="categoria">
                    <img src="COMPIUTER.PNG">
                    <h5>Computadores</h5>
                </div>

                <div class="categoria">
                    <img src="controle.PNG">
                    <h5>Games</h5>
                </div>

                <div class="categoria">
                    <img src="celular.PNG">
                    <h5>Smartphones</h5>
                </div>

            </div>

        </div>

        <div class="carousel-item">

            <div class="d-flex justify-content-around">

                <div class="categoria">
                    <img src="TV.PNG">
                    <h5>TV</h5>
                </div>

                <div class="categoria">
                    <img src="audio.PNG">
                    <h5>Áudio</h5>
                </div>

                <div class="categoria">
                    <img src="M.pc.PNG">
                    <h5>Monte seu PC</h5>
                </div>

            </div>

        </div>

    </div>

    <button class="carousel-control-prev"
        type="button"
        data-bs-target="#categoriasCarousel"
        data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

    </button>

    <button class="carousel-control-next"
        type="button"
        data-bs-target="#categoriasCarousel"
        data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

    </button>

</div>

<section class="Smart">
<img src="Smart.png" alt="">
</section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
